name: Upbit Auto Trade

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: upbit-auto-trade
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: 상태 파일 캐시
        uses: actions/cache@v4
        with:
          path: bot_state.json
          key: upbit-bot-state-${{ github.run_id }}
          restore-keys: |
            upbit-bot-state-

      - name: 가상환경 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 필수 라이브러리 설치
        run: pip install pyupbit requests

      - name: 2종 분산 가변 자동매매 가동
        env:
          UPBIT_ACCESS_KEY: ${{ secrets.UPBIT_ACCESS_KEY }}
          UPBIT_SECRET_KEY: ${{ secrets.UPBIT_SECRET_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bitcoin_trade.py
