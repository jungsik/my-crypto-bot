name: Upbit Auto Trade

on:
  schedule:
    # 5분마다 자동 실행합니다. GitHub Actions cron 기준 시간은 UTC입니다.
    - cron: "*/5 * * * *"

  # GitHub Actions 화면에서 수동 실행 버튼을 표시합니다.
  workflow_dispatch:

concurrency:
  group: upbit-auto-trade
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: 상태 파일 복원
        uses: actions/cache/restore@v4
        with:
          path: bot_state.json
          key: upbit-bot-state
          restore-keys: upbit-bot-state

      - name: 가상환경 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 필수 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 2종 분산 가변 자동매매 가동
        env:
          UPBIT_ACCESS_KEY: ${{ secrets.UPBIT_ACCESS_KEY }}
          UPBIT_SECRET_KEY: ${{ secrets.UPBIT_SECRET_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BOT_STATE_FILE: bot_state.json
        run: python bitcoin_trade.py

      - name: 상태 파일 저장
        uses: actions/cache/save@v4
        if: always()
        with:
          path: bot_state.json
          key: upbit-bot-state-${{ github.run_id }}
